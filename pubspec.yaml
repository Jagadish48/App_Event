name: network_events
description: A new Flutter application for NetworkEvents.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core WebView Plugin
  flutter_inappwebview: ^6.1.5
  
  # Network & State
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  
  # Permissions
  permission_handler: ^11.4.0
  
  # Downloading
  path_provider: ^2.1.5
  flutter_downloader: ^1.11.8
  
  # UI & Utility
  cupertino_icons: ^1.0.8
  
  # Firebase for Push Notifications (must match BoM 34.x in build.gradle.kts)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Native splash screen and App icon generators
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/app_icon.jpeg
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpeg" # Replace with your icon in assets/images/
