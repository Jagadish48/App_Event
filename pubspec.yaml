name: network_events
description: A new Flutter application for NetworkEvents.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core WebView Plugin
  flutter_inappwebview: ^6.0.0
  
  # Network & State
  connectivity_plus: ^5.0.1
  url_launcher: ^6.2.1
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Downloading
  path_provider: ^2.1.1
  flutter_downloader: ^1.11.1
  
  # UI & Utility
  cupertino_icons: ^1.0.2
  
  # Firebase for Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
  # Native splash screen and App icon generators
  flutter_native_splash: ^2.3.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png # Replace with your logo in assets/images/
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpeg" # Replace with your icon in assets/images/
